amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: front_scan
    min_particles: 500
    max_particles: 2000
    update_min_a: 0.1
    update_min_d: 0.1
    transform_tolerance: 0.5
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: /root/sambirion/src/sambirion_navigation/maps/map.yaml

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0  # CHANGED: up from 1.0 - replan more frequently
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.4           # CHANGED: up from 0.25 - accept paths further from goal
      allow_unknown: true
      max_iterations: 1000000
      max_planning_time: 5.0
      smooth_path: true
      downsample_costmap: false

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3   # CHANGED: down from 0.5 - trigger recovery sooner
      movement_time_allowance: 5.0   # CHANGED: up from 10.0 - allow more time to find path
    
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3    # CHANGED: up from 0.25 - more lenient goal acceptance
      yaw_goal_tolerance: 0.25
      stateful: true
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      # ----------------------
      # Core MPPI parameters
      # ----------------------
      time_steps: 70           # CHANGED: up from 56 - longer prediction horizon
      model_dt: 0.05
      batch_size: 3000         # CHANGED: up from 2000 - more trajectory samples
      iteration_count: 1
      temperature: 0.5        # CHANGED: down from 0.3 - more diverse exploration
      gamma: 0.015

      # ----------------------
      # Robot motion limits
      # ----------------------
      vx_max: 0.5
      vx_min: -0.35
      vy_max: 0.0          # differential drive → NO lateral motion
      wz_max: 1.9

      ax_max: 3.0
      ax_min: -3.0
      az_max: 3.5

      vx_std: 0.5              # CHANGED: up from 0.4 - more forward velocity variation
      vy_std: 0.0          # IMPORTANT: no sideways noise
      wz_std: 0.9              # CHANGED: up from 0.6 - more rotational variation

      regenerate_noises: true

      # ----------------------
      # Visualization (KEEP ON)
      # ----------------------
      visualize: true
      publish_optimal_trajectory: true

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      # ----------------------
      # COLLISION CHECKING (CRITICAL)
      # ----------------------
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 5.0
        consider_footprint: true   

      # ----------------------
      # Ackermann (ignored for diff drive, safe to keep)
      # ----------------------
      AckermannConstraints:
        min_turning_r: 0.2

      # ----------------------
      # Critics (ORDER MATTERS)
      # ----------------------
      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
        ]

      # ----------------------
      # Critics configuration
      # ----------------------

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      # 🚨 MAIN OBSTACLE AVOIDANCE
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0         # CHANGED: up from 25.0 - stronger obstacle avoidance
        consider_footprint: true   
        collision_cost: 1000000.0
        critical_cost: 300.0
        near_collision_cost: 253
        near_goal_distance: 0.5   # CHANGED: down from 1.0 - more aggressive near obstacles
        trajectory_point_step: 2

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 1.4

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 0.5

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.0        # CHANGED: down from 2.0 - less strict path following
        offset_from_furthest: 5
        threshold_to_consider: 1.4

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0        # CHANGED: down from 3.0 - allow more misalignment
        max_path_occupancy_ratio: 0.1  # CHANGED: up from 0.05 - tolerate more deviation
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.0        # CHANGED: down from 1.0 - less angle constraint
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.57  # CHANGED: up from 1.0 (90 degrees vs ~57)
        mode: 0

behavior_server:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    # costmap_topic: /merged_costmap_nav2
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    simulate_ahead_time: 1.5   # CHANGED: down from 2.0 - react faster
    max_rotational_vel: 1.5    # CHANGED: up from 1.0 - spin faster during recovery
    min_rotational_vel: 0.6    # CHANGED: up from 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      footprint: "[[0.325, 0.1225], [0.325, -0.1225], [-0.325, -0.1225], [-0.325, 0.1225]]"
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.6
        cost_scaling_factor: 0.5
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6                 # CHANGED: up from 5 - see further ahead
      height: 6                # CHANGED: up from 5
      resolution: 0.05
      footprint: "[[0.325, 0.1225], [0.325, -0.1225], [-0.325, -0.1225], [-0.325, 0.1225]]"
      always_send_full_costmap: true
      
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_persistence: 1.0
        expected_update_rate: 10.0
        observation_sources: front_scan
        combination_method: 1  # Max (obstacles override static)
        front_scan:
          topic: /front_scan
          max_obstacle_height: 10.0
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0
          inf_is_valid: false
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.4   # CHANGED: down from 0.5 - less conservative inflation
        cost_scaling_factor: 3.0  # CHANGED: down from 5.0 - gentler cost gradient