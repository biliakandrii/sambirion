image: map.pgm
resolution: 0.05          # meters per pixel
origin: [-5.0, -5.0, 0.0]   # map origin at bottom-left corner
negate: 1                  # 0 means 0=free, 255=occupied
occupied_thresh: 0.65      # threshold to consider a cell occupied
free_thresh: 0.196         # threshold to consider a cell free
