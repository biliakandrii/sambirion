kf_state_estimator:
  ros__parameters:
    # Input/Output topics
    input_topic: "/obstacles"
    output_topic: "/predicted_obstacles_heatmap"
    
    # Update rate (Hz)
    update_rate: 1.0
    
    # Grid parameters
    grid_resolution: 0.05        # meters per cell
    grid_width: 10.0            # meters (total width)
    grid_height: 10.0           # meters (total height)
    grid_origin_x: -5.0        # meters (grid starts at this x)
    grid_origin_y: -5.0        # meters (grid starts at this y)
    
    # Prediction parameters
    prediction_horizon: 20.0     # seconds (how far into future to predict)
    prediction_time_step: 2.0   # seconds (time between prediction steps)
    
    # Cost parameters
    max_cost: 250               # Maximum cost value (earliest predictions)
    min_cost: 100                # Minimum cost value (furthest predictions)
    cost_decay_rate: 0.1        # Exponential decay rate (higher = faster decay)
    
    # Tracking parameters
    max_obstacle_age: 2.0       # seconds (remove obstacles not seen for this long)
    
    # Kalman Filter parameters
    process_noise_pos: 0.1      # Process noise for position (meters)
    process_noise_vel: 0.5      # Process noise for velocity (m/s)
    measurement_noise_pos: 0.05 # Measurement noise for position (meters)
    measurement_noise_vel: 0.1  # Measurement noise for velocity (m/s)